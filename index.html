<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTO Exam Simulation</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; 
        background-color: #f4f7f6; 
        margin: 0; 
        padding: 20px; 
    }
        .container { max-width: 800px; 
            margin: auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.1); 
        }
        
        /* Exam Header */
        .exam-header { 
            position: sticky; 
            top: 0; 
            background: #1a73e8; 
            color: white; 
            padding: 15px 25px; 
            border-radius: 8px; 
            margin-bottom: 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 100;
        }
        .timer { font-size: 1.2rem; 
            font-weight: bold; 
            font-family: monospace; 
        }

        /* Questions */
        .question-block { 
            border-bottom: 1px solid #eee; 
            padding: 20px 0; 
        }
        .question-text { 
            font-size: 1.1rem; 
            font-weight: 600; 
            margin-bottom: 15px; 
            display: block; 
        }
        .options { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }
        .btn { 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            cursor: pointer; 
            text-align: left; 
            background: white; 
            transition: 0.2s; 
            font-size: 1rem; 
        }
        .btn:hover:not(.disabled) { 
            border-color: #1a73e8; 
            background: #f1f7fe; 
        }
        
        /* Instant Feedback */
        .correct { background-color: #d4edda; 
            border-color: #28a745; 
            color: #155724; 
        }
        .wrong { background-color: #f8d7da; 
            border-color: #dc3545; 
            color: #721c24; }
        .disabled { 
            pointer-events: none;
         }
        .feedback { 
            margin-top: 10px; 
            padding: 10px; 
            border-radius: 5px; 
            font-weight: bold; 
            display: none; 
        }
        .show { 
            display: block; 
        }

        /* Submit Section */
        #submit-area { 
            text-align: center; 
            margin-top: 40px; 
        }
        .submit-btn { 
            background: #28a745; 
            color: white; 
            border: none; 
            padding: 15px 40px; 
            font-size: 1.2rem; 
            border-radius: 8px; 
            cursor: pointer; 
        }
        .submit-btn:hover { 
            background: #218838; 
        }

        /* Results Modal */
        #results-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.85); 
            display: none; 
            justify-content: center; 
            align-items: center; 
            z-index: 1000;
        }
        .results-box { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            text-align: center; 
            max-width: 400px; 
            width: 90%; 
        }
        .passed { 
            color: #28a745; 
            font-size: 2rem; 
        }
        .failed { 
            color: #dc3545; 
            font-size: 2rem; 
        }
        .retake-btn { 
            background: #1a73e8; 
            color: white; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 5px; 
            cursor: pointer; 
            margin-top: 20px; 
            font-size: 1rem; 
        }
        .question-image {
        max-width: 150px;
        width: 80%;
        height: auto;
        margin: 10px 0 20px 0;
        border-radius: 8px;
        border: 1px solid #ddd;
        display: block;
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 columns for mobile */
            gap: 15px;
            margin-top: 15px;
        }
        .btn-image {
            position: relative;
            border: 2px solid #ddd;
            border-radius: 12px;
            background: white;
            padding: 10px;
            cursor: pointer;
            overflow: hidden;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .btn-image:hover:not(.disabled) {
            border-color: #1a73e8;
            background: #f1f7fe;
        }
        .choice-img {
            width: 100%;
            height: auto;
            border-radius: 6px;
            display: block;
        }
        .img-label {
            margin-top: 8px;
            font-weight: bold;
            color: #555;
            font-size: 0.9rem;
        }
        @media (min-width: 600px) {
            .options-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="exam-header">
        <div style="font-weight: bold;">Examination Time</div>
        <div class="timer">Time Remaining: <span id="timer-display">30:00</span></div>
    </div>

    <div id="quiz-container"></div>

    <div id="submit-area">
        <button class="submit-btn" onclick="showResults()">Submit Exam</button>
    </div>
</div>

<div id="results-overlay">
    <div class="results-box">
        <div id="result-status"></div>
        <p style="font-size: 1.2rem; margin: 20px 0;">
            Your Score: <span id="final-score" style="font-weight:bold;">0</span> / 100<br>
            Time Elapsed: <span id="time-taken">0</span>
        </p>
        <button class="retake-btn" onclick="retakeExam()">Retake Exam</button>
    </div>
</div>

<script>

    { q: "2. Nakakita ka ng dilaw (amber) na ilaw sa unahan. Aling ilaw ang susunod na iilaw?", a: ["Pulang ilaw sa gitna", "Pulang ilaw sa ibaba", "Pulang ilaw sa itaas"], c: 2 },
    { q: "3. Kung inaantok ka habang nagmamaneho, ano ang dapat mong gawin?", a: ["Buksan ang aircon para manatiling komportable", "Isara ang bintana para makapag-concentrate", "Huminto at magpahinga agad at tiyaking may sapat na sariwang hangin"], c: 2 },
    { q: "4. Kung papalapit ka sa interseksyon na walang pulis, kanino ka dapat magbigay-daan?", a: ["Sa trapikong nagmumula sa iyong kaliwa", "Sa trapikong nagmumula sa iyong kanan", "Sa trapikong diretsong kasalubong"], c: 1 },
    { q: "5. Sino ang may prayoridad sa right-of-way?", a: ["Fire truck na may ilaw at siren sa emergency", "Malalaking bus", "Articulated trucks"], c: 0 },
    { q: "6. Alin sa mga sumusunod ang paglabag sa hindi pagsunod sa traffic signals?", a: ["Ilegal na pagparada", "Pagsakay at pagbaba ng pasahero", "Paglabag sa pulang ilaw"], c: 2 },
    { q: "7. Kapag naghahanap ng parking space, ano ang dapat mong isaalang-alang?", a: ["Ang angkop na espasyo para sa iyong sasakyan sa tamang parking area", "Espasyo sa kabilang side ng kalsada na kasya ang sasakyan mo", "Ang pinakamalapit sa iyong pupuntahan"], c: 0 },
    { q: "8. Ano ang ibig sabihin ng karatulang pantrapiko na ito?", a: ["Bawal kumanan", "Kurbada pakanan", "Walang trapiko mula sa kanan"], c: 0, img: "sign2.png" },
    { q: "9. Ano ang ibig sabihin ng karatulang pantrapiko na ito?", a: ["Mapanganib na kurbada", "Mapanganib na dobleng kurbada pakanan", "Mapanganib na dobleng kurbada pakaliwa"], c: 2, img: "sign3.png" },
    { q: "10. Ano ang gagawin kung may sasakyang masyadong malapit sa likod mo?", a: ["Pindutin ang preno ng biglaan", "Pabilisin para magsimula ng karera", "Bumagal nang dahan-dahan at magbigay signal para lampasan ka"], c: 2 },
    { q: "11. Saan ka maaaring mag-overtake sa one-way na kalsada?", a: ["Maaaring sa kanan o kaliwa", "Hindi pinapayagan ang pag-overtake", "Sa kaliwang bahagi lamang"], c: 0 },
    { q: "12. Ano ang kulay ng ilaw ng preno?", a: ["Dilaw", "Pula", "Berde"], c: 1 },

    { q: "14. Paano mo inaalagaan ang kable ng preno, silinyador, at clutch?", a: ["Ibabad ang kable sa langis ng makina nang regular.", "Ibabad ang kable sa gasolina ng regular.", "Hugasan ang kable gamit ang sabon at tubig nang regular."], c: 0 },
    { q: "15. Ano ang ibig sabihin ng karatulang pantrapiko na ito?", a: ["Papalapit sa interseksyon", "May highway sa unahan", "May nagsasanib na trapiko sa unahan"], c: 0, img: "sign4.png" },
    { q: "16. Anong inumin ang makakaapekto sa pagmamaneho nang pinakamalala?", a: ["Tubig", "Juice", "Alak"], c: 2 },
    { q: "17. Ang kumikislap na dilaw na traffic light ay nangangahulugang:", a: ["Magbagal at mag-ingat", "May tatawid sasakyan mula sa kabila", "laban sa flashing red"], c: 0 },
    { q: "18. Sa stop line bago ang pedestrian lane, ang drayber ay inaasahang:", a: ["Apakan ang preno", "Umusad", "Huminto"], c: 2 },
    { q: "19. Saan makikita ang karatulang pantrapiko na ito?", a: ["Sa interseksyon", "Bago magmaneho sa makitid na kalsada", "Bago pumasok sa expressway"], c: 0, img: "sign5.png" },
    { q: "20. Sa R.A 8750 magkano ang multa sa unang paglabag sa pagpayag sa batang anim (6) na taon pababa na umupo sa front passenger seat?", a: ["Php 1,500", "Php 2,000", "Php 1,000"], c: 2 },
    { q: "21. Ano ang hindi mo dapat gawin kapag dumadaan sa hospital zone?", a: ["Buksan ang headlight", "Bumusina", "Buksan ang hazard warning light"], c: 1 },

    { q: "23. Paano ka magbibigay ng 'Hand Signal' kapag kakanan:", a: ["hand1.png", "hand2.png", "hand3.png"], labels: ["A", "B", "C"], c: 2, type: "image-choice" },
    { q: "24. Hindi ka sigurado kung makakaapekto ang gamot sa ubo sa iyong pagmamaneho. Ano ang dapat mong gawin?", a: ["Magtanong sa kaibigan o kamag-anak", "Kumonsulta sa doktor at basahin ang label ng gamot", "Magmaneho kung maayos ang pakiramdam mo"], c: 1 },
    { q: "25. Karamihan sa pagkamatay at pagkasugat na may kinalaman sa school service ay nangyayari kapag:", a: ["Ibinababa ang mga bata sa loob ng school campus", "Tumatawid ang mga bata pagkatapos ibaba mula sa school service", "Sinasakay ang mga bata sa loob ng school campusb"], c: 1 },
    { q: "26. Totoo ba na ang student-driver ay hindi pinapatawan ng traffic violation?", a: ["Totoo, ang instructor ang bibigyan ng tiket", "Mali, maaaring bigyan ng tiket ang student-driver", "Mali, tanging professional driver lang ang maaaring mabigyan ng tiket"], c: 1 },

    { q: "28. Ano ang ibig sabihin ng karatulang pantrapiko na ito?", a: ["Bawal mag-overtake", "Manatili sa isang linya", "Bumuo ng dalawang linya"], c: 0, img: "sign7.png" },

    { q: "33. Ang signal na ito ay nagbababala sa drayber ng panganib sa unahan:", a: ["Kumukurap na dilaw (amber) na ilaw", "Kumukurap na pulang ilaw", "Kumukurap na berdeng ilaw"], c: 1 },
    { q: "34. Ano ang ibig sabihin ng karatulang pantrapiko na ito?", a: ["Bawal mag-U-turn", "Mapanganib na kurbada pakaliwa", "Mapanganib na kurbada pakanan"], c: 0, img: "sign8.png" },
    { q: "35. Kailan pwedeng gamitin ang mobile phone?", a: ["Habang umaandar ang sasakyan", "Kapag naka-stop sa pulang ilaw", "Kapag huminto sa ligtas na gilid ng kalsada"], c: 2 },

    { q: "37. Ano ang kulay ng pavement marking na naghihiwalay sa maraming linya ng highway?", a: ["Puti", "Pula", "Kahel"], c: 0 },

    { q: "39. Kailan mo maaaring gamitin ang busina ng iyong sasakyan?", a: ["Para balaan ang iba sa iyong presensya", "Para tawagin ang atensyon ng kaibigan", "Para makuha ang karapatang mauna"], c: 0 },
    { q: "40. Ano ang dapat mong gawin kung ang kasalubong na sasakyan ay tumawid sa gitnang linya para mag-overtake?", a: ["Buksan ang headlights", "Maging alerto at handang bumagal o huminto kung kinakailangan", "Bumusina at panatilihin ang bilis"], c: 1 },
    { q: "41. Maaari kang mag-overtake sa highway kung ito ay may dalawang linya na:", a: ["Putol-putol na puting linya", "Tuloy-tuloy na puting linya", "Tuloy-tuloy na dilaw na linya"], c: 0 },

    { q: "44. Napapansin mo na umuurong-urong o tumatalbong ang sasakyan tuwing pinipindot mo ang preno. Ano ang ibig sabihin nito?", a: ["Luma o sira na ang gulong", "Hindi nakatapat sa gitna ang manibela.", "Luma o sira na ang shock absorbers"], c: 2 },

let score = 0;
let timeLeft = 1800; // 30 minutes in seconds
let timerId;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function startTimer() {
    clearInterval(timerId);
    timerId = setInterval(() => {
        if (timeLeft <= 0) {
            clearInterval(timerId);
            showResults();
        } else {
            timeLeft--;
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            document.getElementById('timer-display').innerText = 
                `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
    }, 1000);
}

function initExam() {
    score = 0;
    timeLeft = 1800;
    document.getElementById('quiz-container').innerHTML = '';
    document.getElementById('results-overlay').style.display = 'none';

    const shuffled = shuffle([...masterQuestions]);

    shuffled.forEach((item, index) => {
        const block = document.createElement('div');
        block.className = 'question-block';

        let optionsHTML = '';

        if (item.type === "image-choice") {
            // Logic for IMAGE choices in a GRID
            const gridItems = item.a.map((imgSrc, i) => `
                <button class="btn btn-image" onclick="checkAnswer(this, ${index}, ${i}, ${item.c})">
                    <img src="${imgSrc}" class="choice-img">
                    <span class="img-label">${item.labels[i]}</span>
                </button>
            `).join('');
            optionsHTML = `<div class="options-grid" id="opt-grp-${index}">${gridItems}</div>`;
        } else {
            // Logic for regular TEXT choices
            const textItems = item.a.map((opt, i) => 
                `<button class="btn" onclick="checkAnswer(this, ${index}, ${i}, ${item.c})">${opt}</button>`
            ).join('');
            optionsHTML = `<div class="options" id="opt-grp-${index}">${textItems}</div>`;
        }

        block.innerHTML = `
            <span class="question-text">${index + 1}. ${item.q.split('. ')[1] || item.q}</span>
            ${optionsHTML}
            <div class="feedback" id="feed-${index}"></div>
        `;
        document.getElementById('quiz-container').appendChild(block);
    });

    startTimer();
    window.scrollTo(0, 0);
}

function checkAnswer(btn, qIdx, selected, correct) {
    const group = document.getElementById(`opt-grp-${qIdx}`);
    const feedback = document.getElementById(`feed-${qIdx}`);
    const btns = group.querySelectorAll('.btn');

    btns.forEach(b => b.classList.add('disabled'));

    if (selected === correct) {
        btn.classList.add('correct');
        feedback.innerHTML = "✓ Tama!";
        feedback.className = "feedback show correct";
        score++;
    } else {
        btn.classList.add('wrong');
        btns[correct].classList.add('correct');
        feedback.innerHTML = "✗ Mali. Ang tama ay: " + btns[correct].innerText;
        feedback.className = "feedback show wrong";
    }
}

function showResults() {
    clearInterval(timerId);
    const totalTime = 1800 - timeLeft;
    const minsTaken = Math.floor(totalTime / 60);
    const secsTaken = totalTime % 60;

    document.getElementById('final-score').innerText = score;
    document.getElementById('time-taken').innerText = `${minsTaken}m ${secsTaken}s`;
    
    const status = document.getElementById('result-status');
    if (score >= 80) { // 80 is the passing score for 100 items
        status.innerHTML = '<span class="passed">PASSED!</span>';
    } else {
        status.innerHTML = '<span class="failed">FAILED</span>';
    }

    document.getElementById('results-overlay').style.display = 'flex';
}

function retakeExam() {
    initExam();
}


initExam();
</script>
