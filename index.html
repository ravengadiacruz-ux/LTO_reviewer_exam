<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTO Exam Simulation</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        
        /* Exam Header */
        .exam-header { 
            position: sticky; top: 0; background: #1a73e8; color: white; 
            padding: 15px 25px; border-radius: 8px; margin-bottom: 30px; 
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .timer { font-size: 1.2rem; font-weight: bold; font-family: monospace; }

        /* Questions */
        .question-block { border-bottom: 1px solid #eee; padding: 20px 0; }
        .question-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 15px; display: block; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 12px; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; text-align: left; background: white; transition: 0.2s; font-size: 1rem; }
        .btn:hover:not(.disabled) { border-color: #1a73e8; background: #f1f7fe; }
        
        /* Instant Feedback */
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; }
        .wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        .disabled { pointer-events: none; }
        .feedback { margin-top: 10px; padding: 10px; border-radius: 5px; font-weight: bold; display: none; }
        .show { display: block; }

        /* Submit Section */
        #submit-area { text-align: center; margin-top: 40px; }
        .submit-btn { background: #28a745; color: white; border: none; padding: 15px 40px; font-size: 1.2rem; border-radius: 8px; cursor: pointer; }
        .submit-btn:hover { background: #218838; }

        /* Results Modal */
        #results-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .results-box { background: white; padding: 40px; border-radius: 15px; text-align: center; max-width: 400px; width: 90%; }
        .passed { color: #28a745; font-size: 2rem; }
        .failed { color: #dc3545; font-size: 2rem; }
        .retake-btn { background: #1a73e8; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; margin-top: 20px; font-size: 1rem; }
    </style>
</head>

let score = 0;
let timeLeft = 1800; // 30 minutes in seconds
let timerId;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function startTimer() {
    clearInterval(timerId);
    timerId = setInterval(() => {
        if (timeLeft <= 0) {
            clearInterval(timerId);
            showResults();
        } else {
            timeLeft--;
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            document.getElementById('timer-display').innerText = 
                `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
    }, 1000);
}

function initExam() {
    score = 0;
    timeLeft = 1800;
    document.getElementById('quiz-container').innerHTML = '';
    document.getElementById('results-overlay').style.display = 'none';

    const shuffled = shuffle([...masterQuestions]);

    shuffled.forEach((item, index) => {
        const block = document.createElement('div');
        block.className = 'question-block';
        
        const opts = item.a.map((opt, i) => 
            `<button class="btn" onclick="checkAnswer(this, ${index}, ${i}, ${item.c})">${opt}</button>`
        ).join('');

        block.innerHTML = `
            <span class="question-text">${index + 1}. ${item.q.split('. ')[1] || item.q}</span>
            <div class="options" id="opt-grp-${index}">${opts}</div>
            <div class="feedback" id="feed-${index}"></div>
        `;
        document.getElementById('quiz-container').appendChild(block);
    });

    startTimer();
    window.scrollTo(0,0);
}

function checkAnswer(btn, qIdx, selected, correct) {
    const group = document.getElementById(`opt-grp-${qIdx}`);
    const feedback = document.getElementById(`feed-${qIdx}`);
    const btns = group.querySelectorAll('.btn');

    btns.forEach(b => b.classList.add('disabled'));

    if (selected === correct) {
        btn.classList.add('correct');
        feedback.innerHTML = "✓ Tama!";
        feedback.className = "feedback show correct";
        score++;
    } else {
        btn.classList.add('wrong');
        btns[correct].classList.add('correct');
        feedback.innerHTML = "✗ Mali. Ang tama ay: " + btns[correct].innerText;
        feedback.className = "feedback show wrong";
    }
}

function showResults() {
    clearInterval(timerId);
    const totalTime = 1800 - timeLeft;
    const minsTaken = Math.floor(totalTime / 60);
    const secsTaken = totalTime % 60;

    document.getElementById('final-score').innerText = score;
    document.getElementById('time-taken').innerText = `${minsTaken}m ${secsTaken}s`;
    
    const status = document.getElementById('result-status');
    if (score >= 80) { // 80 is the passing score for 100 items
        status.innerHTML = '<span class="passed">PASSED!</span>';
    } else {
        status.innerHTML = '<span class="failed">FAILED</span>';
    }

    document.getElementById('results-overlay').style.display = 'flex';
}

function retakeExam() {
    initExam();
}

// Kick off
initExam();
</script>
